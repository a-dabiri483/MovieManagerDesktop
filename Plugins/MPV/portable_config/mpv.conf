# غیرفعال کردن رابط کاربری پیش‌فرض برای استفاده از uosc
osc=no
osd-bar=no
border=no
hwdec=auto

# اولویت زبان‌های صدا و زیرنویس (اول فارسی، بعد انگلیسی)
alang=fa,per,fas,en,eng
slang=fa,per,fas,en,eng

# تنظیمات زیرنویس
sub-font="Segoe UI"
sub-font-size=45
sub-auto=fuzzy
sub-color="#FFFFFFFF"
sub-border-color="#FF000000"
sub-border-size=2
sub-shadow-offset=1
sub-shadow-color="#33000000"
sub-margin-y=36
